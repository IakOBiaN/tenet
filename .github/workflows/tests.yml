name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  fast:
    name: fast test tier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy scipy pytest

      - name: Run fast tests
        run: pytest
